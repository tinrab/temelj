services:
  mysql:
    image: mysql:9.6
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: abc123456
      MYSQL_USER: temelj
      MYSQL_PASSWORD: abc123456
      MYSQL_DATABASE: temelj
    ports:
      - "3306:3306"
    networks:
      - temelj

  # postgres:
  #   image: postgres:18.3
  #   container_name: postgres
  #   restart: always
  #   environment:
  #     POSTGRES_PASSWORD: abc123456
  #     POSTGRES_USER: temelj
  #     POSTGRES_DB: temelj
  #   ports:
  #     - "5432:5432"
